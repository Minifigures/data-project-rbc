<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 1210" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="aGrey" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7DB1"/></marker>
    <marker id="aNavy" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#0B2545"/></marker>
    <marker id="aBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1463B0"/></marker>
    <marker id="aSlate" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748B"/></marker>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#B45309"/></marker>
  </defs>
  <rect x="0" y="0" width="1520" height="1210" fill="#FFFFFF"/>
  <text x="40" y="50" font-size="34" font-weight="bold" fill="#0B2545">ClaimGuard</text>
  <text x="40" y="78" font-size="15" fill="#475569">Auditable, explainable insurance-claim fraud detection, PII-free by design</text>
  <rect x="40" y="90" width="1440" height="3" fill="#1463B0"/>
  <rect x="30" y="108" width="850" height="1078" rx="12" fill="#FBFCFE" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="30" y="108" width="220" height="30" rx="12" fill="#0B2545"/>
  <text x="48" y="128" font-size="14" font-weight="bold" fill="#FFFFFF">FRAME 1 &#183; LOGICAL PIPELINE</text>
  <text x="60" y="164" font-size="12" font-weight="bold" fill="#1463B0">1 &#183; DATA SOURCES (PII-free by construction)</text>
  <rect x="90" y="174" width="330" height="64" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="255" y="200" font-size="14" font-weight="bold" fill="#0B2545" text-anchor="middle">Synthetic generator</text>
  <text x="255" y="220" font-size="11.5" fill="#475569" text-anchor="middle">injected, labelled fraud &#183; zero PII</text>
  <rect x="470" y="174" width="330" height="64" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="635" y="200" font-size="14" font-weight="bold" fill="#0B2545" text-anchor="middle">Open dataset loader</text>
  <text x="635" y="220" font-size="11.5" fill="#475569" text-anchor="middle">Kaggle Medicare set &#183; auto-fallback to synthetic</text>
  <rect x="245" y="262" width="400" height="40" rx="20" fill="#E8F0FB" stroke="#1463B0" stroke-width="1.5"/>
  <text x="445" y="287" font-size="12.5" font-weight="bold" fill="#0B2545" text-anchor="middle">One canonical claim schema &#183; no name / address / DOB</text>
  <line x1="255" y1="238" x2="360" y2="262" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <line x1="635" y1="238" x2="530" y2="262" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <text x="60" y="334" font-size="12" font-weight="bold" fill="#1463B0">2 &#183; INGESTION, VALIDATION &amp; PREPROCESSING</text>
  <line x1="445" y1="302" x2="445" y2="350" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <rect x="404" y="318" width="82" height="17" rx="3" fill="#EDF1F5"/>
  <text x="445" y="331" font-size="10.5" fill="#475569" text-anchor="middle">raw claims</text>
  <rect x="272" y="352" width="346" height="80" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="445" y="376" font-size="13.5" font-weight="bold" fill="#0B2545" text-anchor="middle">Validate, clean &amp; preprocess</text>
  <text x="445" y="396" font-size="11" fill="#475569" text-anchor="middle">schema + quality gate &#183; dedupe &#183; handle missing</text>
  <text x="445" y="414" font-size="11" fill="#475569" text-anchor="middle">coerce types &#183; encode categoricals</text>
  <text x="60" y="456" font-size="12" font-weight="bold" fill="#1463B0">3 &#183; FEATURE ENGINEERING</text>
  <line x1="445" y1="432" x2="445" y2="476" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <rect x="395" y="444" width="100" height="17" rx="3" fill="#EDF1F5"/>
  <text x="445" y="457" font-size="10.5" fill="#475569" text-anchor="middle">clean, typed rows</text>
  <rect x="265" y="478" width="360" height="74" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="445" y="501" font-size="13.5" font-weight="bold" fill="#0B2545" text-anchor="middle">Feature engineering</text>
  <text x="445" y="520" font-size="11" fill="#475569" text-anchor="middle">within-code z-scores &#183; provider aggregates &#183; ratios</text>
  <text x="445" y="538" font-size="11" fill="#475569" text-anchor="middle">shared by rules and ML (identical inputs)</text>
  <text x="60" y="578" font-size="12" font-weight="bold" fill="#1463B0">4 &#183; DETECTION</text>
  <line x1="445" y1="552" x2="445" y2="566" stroke="#5B7DB1" stroke-width="1.6"/>
  <rect x="398" y="556" width="94" height="17" rx="3" fill="#EDF1F5"/>
  <text x="445" y="569" font-size="10.5" fill="#475569" text-anchor="middle">feature matrix</text>
  <line x1="187" y1="566" x2="697" y2="566" stroke="#5B7DB1" stroke-width="1.6"/>
  <line x1="187" y1="566" x2="187" y2="592" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <line x1="445" y1="566" x2="445" y2="592" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <line x1="697" y1="566" x2="697" y2="592" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <rect x="72" y="594" width="230" height="98" rx="8" fill="#0B2545" stroke="#0B2545" stroke-width="2"/>
  <text x="187" y="620" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Deterministic rule engine</text>
  <text x="187" y="639" font-size="10.5" fill="#C7D6EC" text-anchor="middle">YAML policy &#183; NHCAA fraud typologies</text>
  <text x="187" y="656" font-size="10.5" fill="#C7D6EC" text-anchor="middle">0 to 100 score &#183; expert-tunable</text>
  <text x="187" y="678" font-size="11" font-weight="bold" fill="#FEDF6B" text-anchor="middle">AUTHORITATIVE &#183; auditable</text>
  <rect x="330" y="594" width="230" height="98" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="445" y="624" font-size="13" font-weight="bold" fill="#0B2545" text-anchor="middle">Isolation Forest</text>
  <text x="445" y="644" font-size="11" fill="#475569" text-anchor="middle">unsupervised &#183; no labels</text>
  <text x="445" y="668" font-size="11" font-style="italic" fill="#1463B0" text-anchor="middle">advisory signal</text>
  <rect x="582" y="594" width="232" height="98" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="698" y="624" font-size="13" font-weight="bold" fill="#0B2545" text-anchor="middle">Supervised model</text>
  <text x="698" y="644" font-size="11" fill="#475569" text-anchor="middle">logistic / gradient boosting</text>
  <text x="698" y="668" font-size="11" font-style="italic" fill="#1463B0" text-anchor="middle">advisory signal</text>
  <rect x="582" y="706" width="232" height="56" rx="8" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="698" y="729" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">Optional LLM layer</text>
  <text x="698" y="747" font-size="10" fill="#64748B" text-anchor="middle">field extraction + rationale &#183; OUT of score</text>
  <text x="60" y="792" font-size="12" font-weight="bold" fill="#1463B0">5 &#183; SCORER</text>
  <line x1="187" y1="692" x2="430" y2="806" stroke="#0B2545" stroke-width="3" marker-end="url(#aNavy)"/>
  <line x1="445" y1="692" x2="445" y2="806" stroke="#1463B0" stroke-width="1.6" marker-end="url(#aBlue)"/>
  <line x1="698" y1="692" x2="462" y2="806" stroke="#1463B0" stroke-width="1.6" marker-end="url(#aBlue)"/>
  <text x="300" y="744" font-size="10" font-weight="bold" fill="#0B2545">authoritative</text>
  <rect x="265" y="808" width="360" height="74" rx="8" fill="#E8F0FB" stroke="#0B2545" stroke-width="2"/>
  <text x="445" y="832" font-size="14" font-weight="bold" fill="#0B2545" text-anchor="middle">Scorer</text>
  <text x="445" y="851" font-size="11" fill="#334155" text-anchor="middle">rules = authoritative score &#183; ML = advisory signals</text>
  <text x="445" y="869" font-size="11" fill="#334155" text-anchor="middle">bands: auto-pass / review / priority-investigate</text>
  <rect x="648" y="810" width="200" height="48" rx="8" fill="#FFF7ED" stroke="#B45309" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="748" y="830" font-size="10.5" font-weight="bold" fill="#9A3412" text-anchor="middle">Same scorer deploys</text>
  <text x="748" y="846" font-size="10.5" fill="#9A3412" text-anchor="middle">as the AWS Lambda (Frame 2)</text>
  <line x1="625" y1="834" x2="646" y2="834" stroke="#B45309" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#aAmber)"/>
  <text x="60" y="904" font-size="12" font-weight="bold" fill="#1463B0">6 &#183; OUTPUTS, GOVERNANCE &amp; HUMAN-IN-THE-LOOP</text>
  <line x1="445" y1="882" x2="445" y2="900" stroke="#5B7DB1" stroke-width="1.6"/>
  <rect x="372" y="884" width="146" height="17" rx="3" fill="#EDF1F5"/>
  <text x="445" y="897" font-size="10.5" fill="#475569" text-anchor="middle">scored, explained cases</text>
  <line x1="160" y1="900" x2="740" y2="900" stroke="#5B7DB1" stroke-width="1.6"/>
  <line x1="160" y1="900" x2="160" y2="928" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <line x1="360" y1="900" x2="360" y2="928" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <line x1="555" y1="900" x2="555" y2="928" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <line x1="740" y1="900" x2="740" y2="928" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <rect x="72" y="930" width="176" height="72" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="160" y="962" font-size="12.5" font-weight="bold" fill="#0B2545" text-anchor="middle">Human review queue</text>
  <text x="160" y="980" font-size="11" fill="#475569" text-anchor="middle">approve / flag / dismiss</text>
  <rect x="272" y="930" width="176" height="72" rx="8" fill="#FFFFFF" stroke="#0B2545" stroke-width="1.8"/>
  <text x="360" y="958" font-size="12.5" font-weight="bold" fill="#0B2545" text-anchor="middle">Immutable audit log</text>
  <text x="360" y="976" font-size="11" fill="#475569" text-anchor="middle">hash-chained &#183; no PII</text>
  <text x="360" y="992" font-size="10" fill="#1463B0" text-anchor="middle">tamper-evident</text>
  <rect x="470" y="930" width="170" height="72" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="555" y="970" font-size="13" font-weight="bold" fill="#0B2545" text-anchor="middle">FastAPI service</text>
  <rect x="660" y="930" width="160" height="72" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="740" y="962" font-size="12.5" font-weight="bold" fill="#0B2545" text-anchor="middle">Streamlit</text>
  <text x="740" y="980" font-size="11.5" fill="#475569" text-anchor="middle">reviewer dashboard</text>
  <line x1="248" y1="966" x2="272" y2="966" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <text x="200" y="922" font-size="9.5" fill="#64748B" text-anchor="middle">every decision logged</text>
  <path d="M 730 762 L 730 926" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#aSlate)"/>
  <rect x="650" y="1024" width="180" height="54" rx="27" fill="#FFF7ED" stroke="#B45309" stroke-width="1.6"/>
  <circle cx="688" cy="1045" r="8" fill="#FFFFFF" stroke="#B45309" stroke-width="1.6"/>
  <path d="M 676 1064 a12,12 0 0 1 24,0" fill="none" stroke="#B45309" stroke-width="1.6"/>
  <text x="744" y="1050" font-size="12.5" font-weight="bold" fill="#9A3412" text-anchor="middle">Claims reviewer</text>
  <line x1="740" y1="1024" x2="740" y2="1004" stroke="#B45309" stroke-width="1.6" marker-end="url(#aAmber)"/>
  <text x="754" y="1018" font-size="10" fill="#9A3412">triage: approve / flag / dismiss</text>
  <rect x="910" y="108" width="578" height="392" rx="12" fill="#FBFCFE" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="910" y="108" width="250" height="30" rx="12" fill="#0B2545"/>
  <text x="928" y="128" font-size="14" font-weight="bold" fill="#FFFFFF">FRAME 2 &#183; AWS DEPLOYMENT</text>
  <rect x="930" y="200" width="150" height="64" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="1005" y="227" font-size="12.5" font-weight="bold" fill="#0B2545" text-anchor="middle">S3 bucket</text>
  <text x="1005" y="246" font-size="11" fill="#475569" text-anchor="middle">incoming/ prefix</text>
  <rect x="1160" y="200" width="170" height="64" rx="8" fill="#0B2545" stroke="#0B2545" stroke-width="2"/>
  <text x="1245" y="226" font-size="12.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Lambda</text>
  <text x="1245" y="245" font-size="10.5" fill="#C7D6EC" text-anchor="middle">claimguard-scorer (rules)</text>
  <rect x="1338" y="168" width="138" height="56" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="1407" y="191" font-size="12" font-weight="bold" fill="#0B2545" text-anchor="middle">DynamoDB</text>
  <text x="1407" y="209" font-size="10.5" fill="#475569" text-anchor="middle">claimguard-audit</text>
  <rect x="1338" y="240" width="138" height="56" rx="8" fill="#FFFFFF" stroke="#1463B0" stroke-width="1.5"/>
  <text x="1407" y="263" font-size="12" font-weight="bold" fill="#0B2545" text-anchor="middle">S3 bucket</text>
  <text x="1407" y="281" font-size="10.5" fill="#475569" text-anchor="middle">processed/ prefix</text>
  <line x1="1080" y1="232" x2="1158" y2="232" stroke="#5B7DB1" stroke-width="1.8" marker-end="url(#aGrey)"/>
  <text x="1119" y="223" font-size="9.5" fill="#64748B" text-anchor="middle">ObjectCreated</text>
  <line x1="1330" y1="222" x2="1336" y2="200" stroke="#5B7DB1" stroke-width="1.8" marker-end="url(#aGrey)"/>
  <line x1="1330" y1="244" x2="1336" y2="266" stroke="#5B7DB1" stroke-width="1.8" marker-end="url(#aGrey)"/>
  <text x="930" y="318" font-size="11.5" fill="#334155">Runs the <tspan font-weight="bold">same deterministic scorer</tspan> as Frame 1 &#183; region <tspan font-weight="bold">ca-central-1</tspan></text>
  <text x="930" y="338" font-size="11.5" fill="#334155">least-privilege IAM role &#183; also runs locally on LocalStack via</text>
  <text x="930" y="356" font-size="11.5" font-family="monospace" fill="#1463B0">AWS_ENDPOINT_URL=http://localhost:4566</text>
  <rect x="930" y="374" width="546" height="104" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="946" y="398" font-size="11" font-weight="bold" fill="#0B2545">Reference architecture</text>
  <text x="946" y="418" font-size="11" fill="#475569">Deployed and verified end-to-end (scorer to DynamoDB audit</text>
  <text x="946" y="436" font-size="11" fill="#475569">item + processed output), then fully torn down. Nothing is</text>
  <text x="946" y="454" font-size="11" fill="#475569">currently running.</text>
  <rect x="910" y="520" width="578" height="200" rx="12" fill="#FBFCFE" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="930" y="548" font-size="14" font-weight="bold" fill="#0B2545">Legend</text>
  <line x1="934" y1="576" x2="990" y2="576" stroke="#0B2545" stroke-width="3" marker-end="url(#aNavy)"/>
  <text x="1004" y="580" font-size="12" fill="#334155">Authoritative deterministic score (rule engine)</text>
  <line x1="934" y1="606" x2="990" y2="606" stroke="#1463B0" stroke-width="1.8" marker-end="url(#aBlue)"/>
  <text x="1004" y="610" font-size="12" fill="#334155">Advisory ML signal (Isolation Forest, supervised)</text>
  <line x1="934" y1="636" x2="990" y2="636" stroke="#64748B" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aSlate)"/>
  <text x="1004" y="640" font-size="12" fill="#334155">Out-of-score LLM / governance feedback (logged)</text>
  <line x1="934" y1="666" x2="990" y2="666" stroke="#B45309" stroke-width="1.8" marker-end="url(#aAmber)"/>
  <text x="1004" y="670" font-size="12" fill="#334155">Human reviewer action</text>
  <line x1="934" y1="696" x2="990" y2="696" stroke="#5B7DB1" stroke-width="1.6" marker-end="url(#aGrey)"/>
  <text x="1004" y="700" font-size="12" fill="#334155">Pipeline data flow &#183; navy fill = core component</text>
  <rect x="910" y="740" width="578" height="120" rx="12" fill="#E8F0FB" stroke="#0B2545" stroke-width="1.5"/>
  <rect x="910" y="740" width="8" height="120" rx="4" fill="#0B2545"/>
  <text x="938" y="776" font-size="15" font-weight="bold" fill="#0B2545">Privacy is structural, not a policy</text>
  <text x="938" y="804" font-size="12.5" fill="#334155">The claim schema has no field for a name, address, or date of</text>
  <text x="938" y="824" font-size="12.5" fill="#334155">birth. It cannot leak what it cannot store. The deterministic</text>
  <text x="938" y="844" font-size="12.5" fill="#334155">rule score is the auditable floor; ML and the LLM never override it.</text>
  <text x="910" y="892" font-size="10.5" fill="#94A3B8">ClaimGuard &#183; proof of concept &#183; github.com/Minifigures/data-project-rbc</text>
</svg>
