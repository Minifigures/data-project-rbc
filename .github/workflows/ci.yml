name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Create environment and install
        run: |
          uv venv .venv
          VIRTUAL_ENV=.venv uv pip install -r requirements-dev.txt
          VIRTUAL_ENV=.venv uv pip install -e .

      - name: Lint (ruff)
        run: .venv/bin/ruff check src tests

      - name: Test (pytest with coverage)
        run: .venv/bin/pytest --cov=claimguard --cov-report=term-missing
